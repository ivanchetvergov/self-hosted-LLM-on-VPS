services:

  # ==============================
  # PostgreSQL — хранит логи запросов и метаданные доков
  # ==============================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-def}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-def}
      POSTGRES_DB: ${POSTGRES_DB:-def}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-def}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # Qdrant — векторная база, сюда летят эмбеддинги доков
  # ==============================
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  # ==============================
  # Ollama — локальный LLMть
  # ==============================
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  # ==============================
  # Backend — FastAPI, основная логика
  # ==============================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-def}:${POSTGRES_PASSWORD:-def}@postgres:5432/${POSTGRES_DB:-def}
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ../backend:/def # обновление в лайве
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  # ==============================
  # Frontend — React, интерфейс для консультантов и админа
  # ==============================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ../frontend:/def
      - /def/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # ==============================
  # Nginx — склеивает фронт и бэк под одним портом
  # ==============================
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
